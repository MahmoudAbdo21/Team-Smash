<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smash Team | فريق سماش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151e2e;
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease-in-out;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
        }

        [lang="en"] body {
            font-family: 'Poppins', sans-serif;
        }

        /* Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(21, 30, 46, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--accent);
        }

        .lang-toggle {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .lang-toggle:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Cards Container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Card Styling */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.15);
        }

        /* ترتيب العناصر: 
           في اللغة العربية (RTL): العنصر الأول يكون على اليمين والثاني على اليسار.
           لذلك وضعنا البيانات أولاً، ثم الصورة، لتظهر الصورة على الشمال.
        */
        .card-info {
            flex: 1;
        }

        .card-img-container {
            flex-shrink: 0;
        }

        .card img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent);
            padding: 5px;
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .card h4 {
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card p {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card {
                flex-direction: column-reverse !important;
                text-align: center;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Smash <span>Team</span></div>
        <button class="lang-toggle" onclick="toggleLanguage()" id="langBtn">EN</button>
    </header>

    <section class="hero">
        <h1 id="pageTitle">تكنولوجيا التعليم</h1>
        <p id="pageSubtitle">جامعة حلوان | كلية التربية</p>
    </section>

    <div class="container" id="teamContainer">
        </div>

    <script>
        // قاعدة بيانات الفريق (سهلة التعديل جداً)
        const teamData = [
            {
                id: "mahmoud",
                img: "https://ui-avatars.com/api/?name=Mahmoud+Abdalrahman&background=3b82f6&color=fff&size=200",
                ar: {
                    name: "محمود عبدالرحمن عبدالله",
                    role: "مطور برمجيات ومصمم تعليمي",
                    desc: "شغفي الأساسي هو البرمجة. أجيد العمل على كافة برامج الأوفيس، ومحترف في استخدام Articulate Storyline و Canva. لدي خبرة جيدة في المونتاج (Premiere & CapCut)، وأجيد التعامل مع أدوات الذكاء الاصطناعي بكفاءة عالية. شخص طموح ومتفاهم."
                },
                en: {
                    name: "Mahmoud Abdalrahman Abdallah",
                    role: "Software Developer & Instructional Designer",
                    desc: "My main passion is programming. Proficient in all MS Office applications, and highly skilled in Articulate Storyline and Canva. I have good video editing skills (Premiere & CapCut) and effectively utilize AI tools. Ambitious and understanding."
                }
            },
            {
                id: "ahmed",
                img: "https://ui-avatars.com/api/?name=Ahmed+Taha&background=3b82f6&color=fff&size=200",
                ar: {
                    name: "أحمد طه",
                    role: "مصمم تعليمي",
                    desc: "أركز بشكل كامل على تخصصات تكنولوجيا التعليم الاحترافية. أمتلك مهارات قوية في تصميم المحتوى التفاعلي باستخدام Articulate Storyline وإعداد التصميمات الجذابة عبر Canva. شخص متفائل ودائم التطلع للأفضل."
                },
                en: {
                    name: "Ahmed Taha",
                    role: "Instructional Designer",
                    desc: "Fully focused on professional EdTech specialties. I possess strong skills in creating interactive content using Articulate Storyline and attractive designs via Canva. Optimistic and always looking forward."
                }
            },
            {
                id: "salma",
                img: "https://ui-avatars.com/api/?name=Salma+Zahran&background=3b82f6&color=fff&size=200",
                ar: {
                    name: "سلمى زهران",
                    role: "مصممة تعليمية",
                    desc: "أمتلك مهارات متقدمة في استخدام أدوات التصميم التعليمي مثل Canva و Articulate لتطوير بيئات تعلم فعالة ومؤثرة. أتميز بكوني مجتهدة جداً وطموحة في مجالي."
                },
                en: {
                    name: "Salma Zahran",
                    role: "Instructional Designer",
                    desc: "Possess advanced skills in using educational design tools like Canva and Articulate to develop effective learning environments. Highly hardworking and ambitious in my field."
                }
            },
            {
                id: "aya",
                img: "https://ui-avatars.com/api/?name=Aya+Saad&background=3b82f6&color=fff&size=200",
                ar: {
                    name: "آيه سعد",
                    role: "متخصصة تصميم تعليمي",
                    desc: "أبدع في تحويل الأفكار النظرية إلى محتوى تعليمي تفاعلي متكامل بالاعتماد على Articulate و Canva. أتميز بالدقة، الاهتمام بالتفاصيل، والشغف المستمر للتعلم."
                },
                en: {
                    name: "Aya Saad",
                    role: "Instructional Design Specialist",
                    desc: "I excel at transforming theoretical ideas into interactive educational content using Articulate and Canva. Distinguished by accuracy, attention to detail, and a continuous passion for learning."
                }
            },
            {
                id: "habiba",
                img: "https://ui-avatars.com/api/?name=Habiba+Yasser&background=3b82f6&color=fff&size=200",
                ar: {
                    name: "حبيبة ياسر",
                    role: "خبيرة تقنيات تعليم",
                    desc: "أعتمد على مهاراتي في Articulate Storyline و Canva لإنتاج تجارب تعليمية مبتكرة وسلسة تناسب المتعلمين. أسعى دائماً لتطوير أدواتي وتقديم أفضل جودة ممكنة."
                },
                en: {
                    name: "Habiba Yasser",
                    role: "EdTech Expert",
                    desc: "I rely on my skills in Articulate Storyline and Canva to produce innovative and seamless learning experiences. Always striving to develop my tools and deliver the best possible quality."
                }
            }
        ];

        // النصوص الثابتة في الموقع
        const staticText = {
            ar: {
                title: "فريق تكنولوجيا التعليم",
                subtitle: "جامعة حلوان | كلية التربية",
                btn: "English"
            },
            en: {
                title: "Educational Technology Team",
                subtitle: "Helwan University | Faculty of Education",
                btn: "عربي"
            }
        };

        let currentLang = 'ar';

        // وظيفة بناء الكروت
        function renderCards() {
            const container = document.getElementById('teamContainer');
            container.innerHTML = ''; // مسح المحتوى القديم

            teamData.forEach(member => {
                const data = member[currentLang];
                
                const cardHTML = `
                    <div class="card">
                        <div class="card-info">
                            <h2>${data.name}</h2>
                            <h4>${data.role}</h4>
                            <p>${data.desc}</p>
                        </div>
                        <div class="card-img-container">
                            <img src="${member.img}" alt="${data.name}">
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // وظيفة تغيير اللغة
        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            
            // تغيير اتجاه الصفحة و لغتها
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            // تحديث النصوص الثابتة
            document.getElementById('pageTitle').innerText = staticText[currentLang].title;
            document.getElementById('pageSubtitle').innerText = staticText[currentLang].subtitle;
            document.getElementById('langBtn').innerText = staticText[currentLang].btn;

            // إعادة بناء الكروت باللغة الجديدة
            renderCards();
        }

        // تشغيل البناء لأول مرة عند فتح الموقع
        renderCards();
    </script>
</body>
</html>
